# r0astr documentation — built with Zensical
# https://zensical.org

[project]
site_name = "r0astr"
site_url = "https://r0astr.org"
site_description = "Multi-instrument live coding interface built on Strudel"
site_author = "r0astr project"

repo_url = "https://github.com/piatra-automation/r0astr"
repo_name = "piatra-automation/r0astr"

copyright = " "

docs_dir = "docs-source"
site_dir = "docs"

extra_css = ["assets/stylesheets/custom.css"]

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Learn" = [
    { "Overview" = "learn/index.md" },
    { "Concepts" = "learn/concepts.md" },
    { "Multi-Instrument" = "learn/multi-instrument.md" },
    { "Master Panel" = "learn/master-panel.md" },
    { "Remote Control" = "remote-control.md" },
    { "Example Arrangements" = "learn/example-arrangements.md" },
    { "Troubleshooting" = "guides/troubleshooting.md" },
  ] },
  { "FAQ" = "community/faq.md" },
  { "Developers" = [
    { "Overview" = "developers/index.md" },
    { "API Reference" = "developers/api.md" },
    { "Architecture" = "developers/architecture.md" },
    { "Plugin Development" = "developers/plugins.md" },
    { "Skins" = "developers/skins.md" },
    { "Creating Skins" = "developers/creating-skins.md" },
    { "Skin Gallery" = "developers/skin-gallery.md" },
    { "Contributing" = "developers/contributing.md" },
  ] },
  { "Downloads" = "downloads.md" },
]

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------

[project.theme]
custom_dir = "docs-source/overrides"
language = "en"
logo = "assets/images/banner.png"
favicon = "assets/images/icon.png"

features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

# Light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon-star"
toggle.name = "Switch to light mode"

# ---------------------------------------------------------------------------
# Social
# ---------------------------------------------------------------------------

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/piatra-automation/r0astr"

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]
[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
