# Reusable workflow: build Electron distributables for macOS, Windows, and Linux.
# Produces upload artifacts named electron-{platform} for downstream consumption.
name: Build Electron

on:
  workflow_call:
    inputs:
      version:
        description: "Semver version string to inject into package.json (e.g. '0.10.15')"
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact-name: electron-macos-universal
          - os: windows-latest
            platform: win
            artifact-name: electron-windows-x64
          - os: ubuntu-latest
            platform: linux
            artifact-name: electron-linux-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (for node-gyp native modules)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools
        run: pip install setuptools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Delete node_modules AND package-lock.json to ensure platform-specific
        # optional deps resolve correctly on each runner's OS.
        # The lockfile generated on macOS omits other platforms' native bindings (npm #4828).
        run: rm -rf node_modules package-lock.json && npm install

      - name: Inject version into package.json
        env:
          VERSION: ${{ inputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build Vite app
        run: npm run build

      # --- macOS code signing ---
      - name: Configure code signing
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "::warning::No signing certificate — macOS build will be unsigned"
          fi

      - name: Build Electron (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing — electron-builder reads these automatically
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Apple notarization (if configured)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # --- Artifact upload ---
      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            release/*.exe
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error
