# Reusable workflow: build Zensical docs site + lite web app, deploy to GitHub Pages.
# Called by ci.yml orchestrator on every push to main, or manually via workflow_dispatch.
name: Deploy Docs & App to GitHub Pages

on:
  workflow_call:

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        # Delete node_modules AND package-lock.json to ensure platform-specific
        # optional deps like @rollup/rollup-linux-x64-gnu resolve correctly.
        # The lockfile generated on macOS omits Linux native bindings (npm #4828).
        run: rm -rf node_modules package-lock.json && npm install

      - name: Build Zensical site
        run: zensical build --clean
        # Output goes to docs/ per zensical.toml site_dir

      - name: Build r0astr Lite
        run: npm run build:lite

      - name: Combine builds
        run: |
          mkdir -p docs/app
          cp -r dist-lite/* docs/app/

          # Verify CNAME preserved
          if [ ! -f docs/CNAME ]; then
            echo "::warning::CNAME file missing from docs/ — custom domain may not work"
          fi

          echo "Combined site structure:"
          ls -la docs/
          ls -la docs/app/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
