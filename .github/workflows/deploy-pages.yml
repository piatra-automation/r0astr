# Reusable workflow: build MkDocs site + lite web app, deploy to GitHub Pages.
# Called by ci.yml orchestrator on every push to main, or manually via workflow_dispatch.
name: Deploy Docs & App to GitHub Pages

on:
  workflow_call:

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        # npm install instead of npm ci — works around npm bug #4828 where
        # platform-specific optional deps (@rollup/rollup-linux-x64-gnu) are
        # missing when the lockfile was generated on a different OS.
        run: npm install

      - name: Build MkDocs site
        run: mkdocs build --site-dir _site

      - name: Build r0astr Lite
        run: npm run build:lite

      - name: Combine builds
        run: |
          mkdir -p _site/app
          cp -r dist-lite/* _site/app/

          # Verify CNAME preserved
          if [ ! -f _site/CNAME ]; then
            echo "::warning::CNAME file missing from _site/ — custom domain may not work"
          fi

          echo "Combined site structure:"
          ls -la _site/
          ls -la _site/app/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
